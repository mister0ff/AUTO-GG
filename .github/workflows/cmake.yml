name: Build Minecraft Hack

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Install JDK
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'
        
    - name: Verify JDK installation
      run: |
        ls -la /usr/lib/jvm/
        find /usr/lib/jvm/ -name "jni.h"
        
    - name: Install build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential cmake
        
    - uses: actions/checkout@v4
    
    - name: Create build directory
      run: mkdir build
      
    - name: Configure CMake with JDK paths
      working-directory: ./build
      run: |
        JDK_PATH=$(find /usr/lib/jvm/ -name "include" -type d | head -n 1)
        if [ ! -z "$JDK_PATH" ]; then
          cmake .. -DJAVA_INCLUDE_DIR=$JDK_PATH
        else
          cmake ..
        fi
        
    - name: Build
      working-directory: ./build
      run: make
      
    - name: Test
      working-directory: ./build
      run: ./test
      
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: libminecraft_hack.so
        path: build/libminecraft_hack.so
        
    - name: Run tests
      run: |
        cd build
        ./test
