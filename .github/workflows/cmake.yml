name: Build Minecraft Hack

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup CMake
      uses: jwlawson/actions-setup-cmake@v1
      with:
        cmake-version: '3.22'
        
    - name: Create build directory
      run: mkdir build
      
    - name: Configure CMake
      working-directory: ./build
      run: cmake ..
      
    - name: Build
      working-directory: ./build
      run: make
      
    - name: Test
      working-directory: ./build
      run: ./test
      
    - name: Upload artifacts
      uses: actions/upload-artifact@v3
      with:
        name: libminecraft_hack.so
        path: build/libminecraft_hack.so
        
    - name: Run tests
      run: |
        cd build
        ./test
